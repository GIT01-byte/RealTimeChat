services:
  postgres:
    image: postgres:17
    command: -p 5432
    container_name: rt-chat-postgres
    environment:
      POSTGRES_DB: ${RTCHAT_DB_NAME}
      POSTGRES_USER: ${RTCHAT_DB_USER}
      POSTGRES_PASSWORD: ${RTCHAT_DB_PWD}
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_media:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:8
    container_name: rt-chat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec
  
  rt-chat-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rt-chat
    ports:
      - "8001:8001"
    environment:
      RTCHAT_APP_MODE: ${RTCHAT_APP_MODE}

      RTCHAT_DB_HOST: postgres
      RTCHAT_DB_PORT: 5432
      RTCHAT_DB_NAME: ${RTCHAT_DB_NAME}
      RTCHAT_DB_USER: ${RTCHAT_DB_USER}
      RTCHAT_DB_PWD: ${RTCHAT_DB_PWD}
      
      RTCHAT_REDIS_HOST: redis
      RTCHAT_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    command:
      [
        "bash",
        "-c",
        "alembic upgrade head && python -m application.web",
      ]
    networks:
      - app-network

volumes:
  postgres_data_media:
  redis_data:
      driver: local

networks:
  app-network:
    external: true
