<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>RT Chat — Test</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 20px auto; padding: 0 16px; }
    section { border: 1px solid #ccc; padding: 12px; margin-bottom: 16px; border-radius: 6px; }
    h3 { margin: 0 0 8px; }
    input, textarea { width: 100%; box-sizing: border-box; margin-bottom: 6px; padding: 4px; }
    button { margin-right: 6px; padding: 4px 10px; cursor: pointer; }
    #messages { height: 200px; overflow-y: auto; border: 1px solid #aaa; padding: 8px; background: #f9f9f9; }
    .msg { margin: 4px 0; }
    .msg.incoming { color: #1a6e1a; }
    .msg.outgoing { color: #1a1a8e; }
    pre { background: #eee; padding: 8px; overflow-x: auto; font-size: 12px; }
  </style>
</head>
<body>
  <h2>RT Chat — Test UI</h2>

  <!-- Токен -->
  <section>
    <h3>1. JWT токен</h3>
    <input id="token" placeholder="Вставь Bearer токен (без слова Bearer)" />
    <small>Получи токен через Users-service: POST /api/v1/auth/login</small>
  </section>

  <!-- Health check -->
  <section>
    <h3>2. Health Check</h3>
    <button onclick="healthCheck()">GET /health_check/</button>
    <pre id="health-result">—</pre>
  </section>

  <!-- Список пользователей + текущий юзер -->
  <section>
    <h3>3. GET / — текущий пользователь + все юзеры</h3>
    <button onclick="getChat()">GET /</button>
    <pre id="chat-result">—</pre>
  </section>

  <!-- История сообщений -->
  <section>
    <h3>4. История сообщений с пользователем</h3>
    <input id="history-user-id" placeholder="user_id собеседника" type="number" />
    <button onclick="getMessages()">GET /messages/{user_id}</button>
    <pre id="history-result">—</pre>
  </section>

  <!-- Отправка сообщения через REST -->
  <section>
    <h3>5. Отправить сообщение (REST POST)</h3>
    <input id="send-recipient-id" placeholder="recipient_id" type="number" />
    <input id="send-text" placeholder="Текст сообщения" />
    <button onclick="sendMessage()">POST /messages</button>
    <pre id="send-result">—</pre>
  </section>

  <!-- WebSocket -->
  <section>
    <h3>6. WebSocket /ws/{user_id}</h3>
    <input id="ws-user-id" placeholder="Твой user_id" type="number" />
    <button onclick="connectWS()">Подключиться</button>
    <button onclick="disconnectWS()">Отключиться</button>
    <span id="ws-status" style="color:gray">● отключён</span>
    <div id="messages"></div>
  </section>

  <script>
    const API_URL = 'http://localhost:8001/real_time_chat'
    const WS_URL = 'ws://localhost:8001/real_time_chat/ws'
    let ws = null

    function getToken() {
      return document.getElementById('token').value.trim()
    }

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`
      }
    }

    async function healthCheck() {
      const res = await fetch(`${API_URL}/health_check/`)
      document.getElementById('health-result').textContent = JSON.stringify(await res.json(), null, 2)
    }

    async function getChat() {
      const res = await fetch(`${API_URL}/`, { headers: authHeaders() })
      document.getElementById('chat-result').textContent = JSON.stringify(await res.json(), null, 2)
    }

    async function getMessages() {
      const userId = document.getElementById('history-user-id').value
      const res = await fetch(`${API_URL}/messages/${userId}`, { headers: authHeaders() })
      document.getElementById('history-result').textContent = JSON.stringify(await res.json(), null, 2)
    }

    async function sendMessage() {
      const recipientId = parseInt(document.getElementById('send-recipient-id').value)
      const text = document.getElementById('send-text').value
      const res = await fetch(`${API_URL}/messages`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ recipient_id: recipientId, text })
      })
      document.getElementById('send-result').textContent = JSON.stringify(await res.json(), null, 2)
    }

    function connectWS() {
      const userId = document.getElementById('ws-user-id').value
      if (!userId) return alert('Введи user_id')
      ws = new WebSocket(`${WS_URL}/${userId}`)

      ws.onopen = () => {
        document.getElementById('ws-status').textContent = '● подключён'
        document.getElementById('ws-status').style.color = 'green'
        addMessage('system', `WebSocket подключён (user_id=${userId})`)
      }
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data)
        addMessage('incoming', `От ${data.sender_id}: ${data.text}`)
      }
      ws.onclose = () => {
        document.getElementById('ws-status').textContent = '● отключён'
        document.getElementById('ws-status').style.color = 'gray'
        addMessage('system', 'WebSocket отключён')
      }
      ws.onerror = (e) => addMessage('system', `Ошибка WS: ${e}`)
    }

    function disconnectWS() {
      ws?.close()
    }

    function addMessage(type, text) {
      const div = document.createElement('div')
      div.className = `msg ${type}`
      div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`
      const box = document.getElementById('messages')
      box.appendChild(div)
      box.scrollTop = box.scrollHeight
    }
  </script>
</body>
</html>
