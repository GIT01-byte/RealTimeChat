services:
  rt-chat-media-service-postgres:
    image: postgres:17
    command: -p 5434
    container_name: rt-chat-media-service-postgres
    environment:
      POSTGRES_DB: ${MEDIA_DB_NAME}
      POSTGRES_USER: ${MEDIA_DB_USER}
      POSTGRES_PASSWORD: ${MEDIA_DB_PWD}
    ports:
      - "5434:5434"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -p 5434 -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_media:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network
  
  rt-chat-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rt-chat-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMPQ
      - "15672:15672" # UI
    environment:
      RABBITMQ_DEFAULT_USER: ${MEDIA_RABBITMQ_LOGIN}
      RABBITMQ_DEFAULT_PASS: ${MEDIA_RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
  
  rt-chat-jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rt-chat-jaeger
    ports:
      - "16686:16686" # UI
      - "14269:14269" # Admin/Health check
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      # Enable OTLP (OpenTelemetry Protocol) receiver for modern tracing
      COLLECTOR_OTLP_ENABLED: true
      LOG_LEVEL: debug
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s # Время на прогрев
    networks:
      - app-network
  
  rt-chat-media-service-outbox_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rt-chat-media-service-outbox_worker
    environment:
      MEDIA_APP_MODE: ${MEDIA_APP_MODE}
      
      MEDIA_DB_HOST: postgres
      MEDIA_DB_PORT: 5434
      MEDIA_DB_NAME: ${MEDIA_DB_NAME}
      MEDIA_DB_USER: ${MEDIA_DB_USER}
      MEDIA_DB_PWD: ${MEDIA_DB_PWD}
      
      MEDIA_S3_ACCESSKEY: ${MEDIA_S3_ACCESSKEY}
      MEDIA_S3_SECRETKEY: ${MEDIA_S3_SECRETKEY}
      MEDIA_S3_ENDPOINTURL: ${MEDIA_S3_ENDPOINTURL}
      MEDIA_S3_BUCKETNAME: ${MEDIA_S3_BUCKETNAME}
      
      MEDIA_RABBITMQ_HOST: rabbitmq
      MEDIA_RABBITMQ_PORT: 5672
      MEDIA_RABBITMQ_LOGIN: ${MEDIA_RABBITMQ_LOGIN}
      MEDIA_RABBITMQ_PASSWORD: ${MEDIA_RABBITMQ_PASSWORD}
      
      MEDIA_OUTBOX_ENABLED: ${MEDIA_OUTBOX_ENABLED}
      MEDIA_OUTBOX_POLL_INTERVAL: ${MEDIA_OUTBOX_POLL_INTERVAL}
    ports:
      - "8004:8004"
    depends_on:
      rt-chat-media-service-postgres:
        condition: service_healthy
      rt-chat-rabbitmq:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    command: python -m application.outbox_worker
    networks:
      - app-network
    restart: unless-stopped
  
  rt-chat-media-service-file_processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rt-chat-media-service-file_processor
    environment:
      MEDIA_APP_MODE: ${MEDIA_APP_MODE}
      
      MEDIA_DB_HOST: postgres
      MEDIA_DB_PORT: 5434
      MEDIA_DB_NAME: ${MEDIA_DB_NAME}
      MEDIA_DB_USER: ${MEDIA_DB_USER}
      MEDIA_DB_PWD: ${MEDIA_DB_PWD}
      
      MEDIA_S3_ACCESSKEY: ${MEDIA_S3_ACCESSKEY}
      MEDIA_S3_SECRETKEY: ${MEDIA_S3_SECRETKEY}
      MEDIA_S3_ENDPOINTURL: ${MEDIA_S3_ENDPOINTURL}
      MEDIA_S3_BUCKETNAME: ${MEDIA_S3_BUCKETNAME}
      
      MEDIA_RABBITMQ_HOST: rabbitmq
      MEDIA_RABBITMQ_PORT: 5672
      MEDIA_RABBITMQ_LOGIN: ${MEDIA_RABBITMQ_LOGIN}
      MEDIA_RABBITMQ_PASSWORD: ${MEDIA_RABBITMQ_PASSWORD}
    ports:
      - "8005:8005"
    depends_on:
      rt-chat-media-service-postgres:
        condition: service_healthy
      rt-chat-rabbitmq:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    command: python -m application.file_process_worker
    networks:
      - app-network
    restart: unless-stopped
  
  rt-chat-media-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rt-chat-media-service
    ports:
      - "8003:8003"
    environment:
      MEDIA_APP_MODE: ${MEDIA_APP_MODE}

      MEDIA_DB_HOST: postgres
      MEDIA_DB_PORT: 5434
      MEDIA_DB_NAME: ${MEDIA_DB_NAME}
      MEDIA_DB_USER: ${MEDIA_DB_USER}
      MEDIA_DB_PWD: ${MEDIA_DB_PWD}

      MEDIA_S3_ACCESSKEY: ${MEDIA_S3_ACCESSKEY}
      MEDIA_S3_SECRETKEY: ${MEDIA_S3_SECRETKEY}
      MEDIA_S3_ENDPOINTURL: ${MEDIA_S3_ENDPOINTURL}
      MEDIA_S3_BUCKETNAME: ${MEDIA_S3_BUCKETNAME}

      MEDIA_RABBITMQ_HOST: rabbitmq
      MEDIA_RABBITMQ_PORT: 5672
      MEDIA_RABBITMQ_LOGIN: ${MEDIA_RABBITMQ_LOGIN}
      MEDIA_RABBITMQ_PASSWORD: ${MEDIA_RABBITMQ_PASSWORD}
      
      MEDIA_OUTBOX_ENABLED: ${MEDIA_OUTBOX_ENABLED}
      MEDIA_OUTBOX_POLL_INTERVAL: ${MEDIA_OUTBOX_POLL_INTERVAL}
    depends_on:
      rt-chat-media-service-postgres:
        condition: service_healthy
      rt-chat-rabbitmq:
        condition: service_healthy
      rt-chat-jaeger:
        condition: service_healthy
      rt-chat-media-service-outbox_worker:
        condition: service_started
      rt-chat-media-service-file_processor:
        condition: service_started
    logging:
      driver: json-file
      options:
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    command:
      [
        "bash",
        "-c",
        "alembic upgrade head && service clamav-daemon start && python -m application.web",
      ]
    networks:
      - app-network

volumes:
  postgres_data_media:
  rabbitmq_data:
    driver: local

networks:
  app-network:
    external: true
